name: Update Intune blog hub

on:
  schedule:
    # Daily at 06:00 UTC. Adjust the cron as you like.
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # allows manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-hub
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Aggregate feeds and build dashboard
        run: python aggregate.py

      - name: Commit updated data and dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles.json docs/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Intune blog hub ($(date -u +%Y-%m-%d))"
            git push
          fi
